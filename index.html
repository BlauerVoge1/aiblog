<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>基于Ai的blog · 增强版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: #f8fafc; }
        .blog-card { margin-bottom: 24px; transition: 0.2s ease; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.03), 0 1px 2px rgba(0,0,0,0.05); cursor: pointer; }
        .blog-card:hover { box-shadow: 0 12px 24px -12px rgba(0,0,0,0.12); transform: translateY(-2px); }
        .container { max-width: 960px; margin-top: 32px; margin-bottom: 48px; }
        .nav-user { color: white; font-weight: 500; background: rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 40px; font-size: 0.9rem; cursor: pointer; }
        .card-text { white-space: pre-wrap; word-break: break-word; line-height: 1.6; color: #1e293b; }
        .blog-meta { font-size: 0.8rem; border-left: 3px solid #0d6efd; padding-left: 10px; background: #f1f5f9; border-radius: 12px; }
        .empty-state { background: #ffffffdd; backdrop-filter: blur(2px); border-radius: 2rem; padding: 3rem; text-align: center; }
        footer { text-align: center; padding: 24px 0; color: #64748b; border-top: 1px solid #e2e8f0; margin-top: 32px; }
        .guest-badge { background: #e9ecef; border-radius: 20px; padding: 2px 12px; font-size: 0.7rem; color: #2c3e66; }
        .comment-item { background: #ffffff; border-radius: 20px; padding: 12px 16px; margin-bottom: 12px; border: 1px solid #e9edf2; }
        .detail-cover { background: white; border-radius: 32px; padding: 2rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .stat-card { background: #f8fafc; border-radius: 16px; padding: 15px; border: 1px solid #e2e8f0; }
        .d-none { display: none !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="#" onclick="showBlogList()">📖 home</a>
        <div id="nav-auth" class="d-flex align-items-center gap-2"></div>
    </div>
</nav>

<div class="container">
    <div id="blog-list-page" class="d-none">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
            <h2 class="fw-semibold" style="color:#0f172a;">✨ 最新笔谈</h2>
            <button class="btn btn-success rounded-pill px-4 shadow-sm" onclick="checkBeforePublish()">✍️ 写博客</button>
        </div>
        <div id="blog-list" class="row g-3"></div>
    </div>

    <div id="blog-detail-page" class="d-none">
        <div class="mb-3"><button class="btn btn-outline-secondary rounded-pill px-3" onclick="showBlogList()">← 返回列表</button></div>
        <div id="detail-content" class="detail-cover"></div>
    </div>

    <div id="login-page" class="d-none">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-header bg-white border-0 pt-4"><h3 class="text-center fw-semibold">🔐 登录</h3></div>
                    <div class="card-body p-4">
                        <form id="login-form">
                            <div class="mb-3"><label class="form-label">邮箱</label><input type="email" id="login-username" class="form-control" required></div>
                            <div class="mb-4"><label class="form-label">密码</label><input type="password" id="login-password" class="form-control" required></div>
                            <button type="submit" class="btn btn-primary w-100 rounded-pill">登录</button>
                            <p class="mt-3 text-center small"><a href="#" onclick="showRegisterPage()">没有账号？立即注册</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="register-page" class="d-none">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-header bg-white border-0 pt-4"><h3 class="text-center fw-semibold">📝 注册</h3></div>
                    <div class="card-body p-4">
                        <form id="register-form">
                            <div class="mb-3"><label class="form-label">邮箱地址</label><input type="email" id="register-username" class="form-control" required></div>
                            <div class="mb-4"><label class="form-label">密码 (至少6位)</label><input type="password" id="register-password" class="form-control" required></div>
                            <button type="submit" class="btn btn-primary w-100 rounded-pill">注册</button>
                            <p class="mt-3 text-center small"><a href="#" onclick="showLoginPage()">已有账号？去登录</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="profile-page" class="d-none">
        <div class="detail-cover">
            <div class="d-flex align-items-center gap-4 mb-4 border-bottom pb-4">
                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 64px; height: 64px; font-size: 1.5rem;">👤</div>
                <div>
                    <h3 class="fw-bold mb-0" id="pro-name">---</h3>
                    <p class="text-muted mb-0 small" id="pro-email">---</p>
                </div>
            </div>
            <div class="row g-3">
                <div class="col-6"><div class="stat-card text-center"><h4 class="fw-bold mb-0 text-primary" id="stat-blog">0</h4><small class="text-muted">文章</small></div></div>
                <div class="col-6"><div class="stat-card text-center"><h4 class="fw-bold mb-0 text-primary" id="stat-comm">0</h4><small class="text-muted">评论</small></div></div>
                
                <div class="col-md-6 mt-4">
                    <div class="p-3 bg-light rounded-3 h-100">
                        <label class="small text-muted mb-2 fw-bold">修改昵称</label>
                        <div class="input-group">
                            <input type="text" id="new-nick" class="form-control" placeholder="新昵称">
                            <button class="btn btn-primary" onclick="updateNick()">保存</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 mt-4">
                    <div class="p-3 bg-light rounded-3 h-100">
                        <label class="small text-muted mb-2 fw-bold">重置密码</label>
                        <div class="input-group">
                            <input type="password" id="new-password" class="form-control" placeholder="至少6位新密码">
                            <button class="btn btn-danger" onclick="updatePassword()">更新</button>
                        </div>
                    </div>
                </div>
            </div>

            <h5 class="fw-bold mb-3 mt-5 border-bottom pb-2">稿件管理</h5>
            <div id="my-list" class="list-group list-group-flush"></div>
        </div>
    </div>

    <div id="publish-page" class="d-none">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-4">
                <form id="publish-form">
                    <div class="mb-3"><label class="form-label fw-bold">标题</label><input type="text" id="blog-title" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label fw-bold">正文</label><textarea id="blog-content" rows="10" class="form-control" required></textarea></div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary rounded-pill px-4">🚀 立即发布</button>
                        <button type="button" class="btn btn-light rounded-pill px-4" onclick="showBlogList()">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editBlogModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-body p-4">
                <h5 class="fw-bold mb-3">编辑文章</h5>
                <div class="mb-3"><label class="form-label">标题</label><input type="text" id="edit-title" class="form-control"></div>
                <div class="mb-3"><label class="form-label">内容</label><textarea id="edit-content" rows="6" class="form-control"></textarea></div>
                <button class="btn btn-primary w-100 rounded-pill" id="saveEditBtn">保存修改</button>
            </div>
        </div>
    </div>
</div>

<footer>© 基于Ai的blog</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const SUPABASE_URL = 'https://icqmextioewqhjdnzlsf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljcW1leHRpb2V3cWhqZG56bHNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3OTE5MTgsImV4cCI6MjA5MTM2NzkxOH0.5qBYNkBNuEzQ0oXe5a29DKCbFaghW_pCOPnFMM20ZD0';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let editModal = null;
    let currentEditId = null;

    window.onload = () => {
        editModal = new bootstrap.Modal(document.getElementById('editBlogModal'));
        checkUser();
        showBlogList();
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    function showPage(id) {
        document.querySelectorAll('[id$="-page"]').forEach(el => el.classList.add('d-none'));
        document.getElementById(id).classList.remove('d-none');
        if (id === 'blog-list-page') renderBlogs();
        window.scrollTo(0,0);
    }

    async function checkUser() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) {
            const { data: profile } = await supabaseClient.from('profiles').select('username').eq('id', user.id).single();
            currentUser = { id: user.id, email: user.email, username: profile?.username || user.email.split('@')[0] };
        } else {
            currentUser = null;
        }
        updateNav();
    }

    function updateNav() {
        const nav = document.getElementById('nav-auth');
        nav.innerHTML = currentUser 
            ? `<span class="nav-user" onclick="showProfilePage()">👤 ${escapeHtml(currentUser.username)}</span><button class="btn btn-sm btn-light rounded-pill" onclick="logout()">退出</button>`
            : `<button class="btn btn-sm btn-outline-light rounded-pill" onclick="showLoginPage()">登录</button><span class="guest-badge ms-1">只读模式</span>`;
    }

    // ========== 认证系统 ==========
    document.getElementById('register-form').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('register-username').value.trim();
        const password = document.getElementById('register-password').value;
        if (password.length < 6) return alert('密码至少需要6位');
        const { data, error } = await supabaseClient.auth.signUp({ email, password });
        if (error) return alert(error.message);
        await supabaseClient.from('profiles').insert([{ id: data.user.id, username: email.split('@')[0] }]);
        alert('注册成功！'); showLoginPage();
    };

    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) return alert('邮箱或密码错误');
        await checkUser(); showBlogList();
    };

    async function logout() { await supabaseClient.auth.signOut(); currentUser = null; updateNav(); showBlogList(); }

    // ========== 个人中心核心逻辑 ==========
    async function showProfilePage() {
        showPage('profile-page');
        document.getElementById('pro-name').innerText = currentUser.username;
        document.getElementById('pro-email').innerText = currentUser.email;

        const [bRes, cRes] = await Promise.all([
            supabaseClient.from('blogs').select('*', { count: 'exact', head: true }).eq('author_id', currentUser.id),
            supabaseClient.from('comments').select('*', { count: 'exact', head: true }).eq('author_id', currentUser.id)
        ]);
        document.getElementById('stat-blog').innerText = bRes.count || 0;
        document.getElementById('stat-comm').innerText = cRes.count || 0;

        const { data: myBlogs } = await supabaseClient.from('blogs').select('id, title').eq('author_id', currentUser.id);
        document.getElementById('my-list').innerHTML = (myBlogs || []).map(b => `
            <div class="list-group-item d-flex justify-content-between align-items-center bg-transparent border-bottom px-0">
                <span style="cursor:pointer" class="fw-medium text-dark" onclick="renderBlogDetail(${b.id})">${escapeHtml(b.title)}</span>
                <button class="btn btn-sm btn-link text-danger text-decoration-none" onclick="deleteBlog(${b.id})">删除</button>
            </div>
        `).join('') || '<p class="py-3 text-muted text-center">暂无稿件</p>';
    }

    async function updateNick() {
        const n = document.getElementById('new-nick').value.trim();
        if (!n) return alert("请输入新昵称");
        const { error } = await supabaseClient.from('profiles').upsert({ id: currentUser.id, username: n });
        if (!error) { alert("昵称已更新"); await checkUser(); showProfilePage(); }
    }

    async function updatePassword() {
        const pw = document.getElementById('new-password').value.trim();
        if (pw.length < 6) return alert("新密码至少6位");
        const { error } = await supabaseClient.auth.updateUser({ password: pw });
        if (error) alert("更新失败: " + error.message);
        else { alert("密码重置成功！"); document.getElementById('new-password').value = ''; }
    }

    // ========== 博客逻辑 ==========
    async function renderBlogs() {
        const { data: blogs } = await supabaseClient.from('blogs').select('*').order('created_at', { ascending: false });
        const container = document.getElementById('blog-list');
        container.innerHTML = blogs?.length ? blogs.map(b => `
            <div class="col-12">
                <div class="card blog-card rounded-4 shadow-sm" onclick="renderBlogDetail(${b.id})">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-2 text-dark">${escapeHtml(b.title)}</h4>
                        <div class="blog-meta mb-2">✍️ ${escapeHtml(b.author_name)} · 🕘 ${new Date(b.created_at).toLocaleDateString()}</div>
                        <p class="text-muted small">${escapeHtml(b.content.substring(0, 100))}...</p>
                    </div>
                </div>
            </div>
        `).join('') : '<div class="col-12 text-center py-5">暂无内容</div>';
    }

    async function renderBlogDetail(id) {
        const { data: blog } = await supabaseClient.from('blogs').select('*').eq('id', id).single();
        const { data: comments } = await supabaseClient.from('comments').select('*').eq('blog_id', id).order('created_at', { ascending: false });
        const isOwner = currentUser && currentUser.id === blog.author_id;
        document.getElementById('detail-content').innerHTML = `
            <h2 class="fw-bold text-dark">${escapeHtml(blog.title)}</h2>
            <div class="blog-meta mb-4 mt-3">👤 ${escapeHtml(blog.author_name)} · 🕘 ${new Date(blog.created_at).toLocaleString()}</div>
            <div class="card-text fs-5 mb-5">${escapeHtml(blog.content).replace(/\n/g, '<br>')}</div>
            ${isOwner ? `<div class="mb-4 bg-light p-3 rounded-3 d-inline-block"><button class="btn btn-sm btn-outline-primary" onclick="openEdit(${blog.id}, \`${blog.title.replace(/`/g,"\\`")}\`, \`${blog.content.replace(/`/g,"\\`")}\`)">编辑</button> <button class="btn btn-sm btn-outline-danger" onclick="deleteBlog(${blog.id})">删除</button></div>` : ''}
            <hr>
            <h5 class="fw-bold mt-4">💬 评论区 (${comments?.length || 0})</h5>
            <div class="mt-3">${currentUser ? `<div class="d-flex gap-2"><input id="c-input" class="form-control" placeholder="撰写评论..."><button class="btn btn-primary px-4" onclick="postComment(${id})">发表</button></div>` : ''}</div>
            <div class="mt-4">${(comments || []).map(c => `<div class="comment-item shadow-sm"><div class="d-flex justify-content-between mb-1"><strong class="small text-primary">${escapeHtml(c.author_name)}</strong><small class="text-muted" style="font-size:0.7rem">${new Date(c.created_at).toLocaleDateString()}</small></div><div class="small">${escapeHtml(c.content)}</div></div>`).join('')}</div>
        `;
        showPage('blog-detail-page');
    }

    document.getElementById('publish-form').onsubmit = async (e) => {
        e.preventDefault();
        const { error } = await supabaseClient.from('blogs').insert([{ title: document.getElementById('blog-title').value, content: document.getElementById('blog-content').value, author_id: currentUser.id, author_name: currentUser.username }]);
        if (error) alert(error.message); else { alert("发布成功！"); document.getElementById('publish-form').reset(); showBlogList(); }
    };

    async function postComment(blogId) {
        const val = document.getElementById('c-input').value;
        if(!val) return;
        await supabaseClient.from('comments').insert([{ blog_id: blogId, content: val, author_id: currentUser.id, author_name: currentUser.username }]);
        renderBlogDetail(blogId);
    }

    async function deleteBlog(id) {
        if(!confirm('确定永久删除吗？')) return;
        await supabaseClient.from('blogs').delete().eq('id', id);
        document.getElementById('profile-page').classList.contains('d-none') ? showBlogList() : showProfilePage();
    }

    function openEdit(id, t, c) { currentEditId = id; document.getElementById('edit-title').value = t; document.getElementById('edit-content').value = c; editModal.show(); }
    document.getElementById('saveEditBtn').onclick = async () => {
        await supabaseClient.from('blogs').update({ title: document.getElementById('edit-title').value, content: document.getElementById('edit-content').value }).eq('id', currentEditId);
        editModal.hide(); renderBlogDetail(currentEditId);
    };

    window.showLoginPage = () => showPage('login-page');
    window.showRegisterPage = () => showPage('register-page');
    window.showBlogList = () => showPage('blog-list-page');
    window.checkBeforePublish = () => currentUser ? showPage('publish-page') : showLoginPage();
</script>
</body>
</html>
