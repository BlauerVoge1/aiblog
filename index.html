<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>墨韵博客 · 云端版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: #f8fafc; }
        .blog-card { margin-bottom: 24px; transition: 0.2s ease; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.03), 0 1px 2px rgba(0,0,0,0.05); cursor: pointer; }
        .blog-card:hover { box-shadow: 0 12px 24px -12px rgba(0,0,0,0.12); transform: translateY(-2px); }
        .container { max-width: 960px; margin-top: 32px; margin-bottom: 48px; }
        .nav-user { color: white; font-weight: 500; background: rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 40px; font-size: 0.9rem; }
        .card-text { white-space: pre-wrap; word-break: break-word; line-height: 1.6; color: #1e293b; }
        .blog-meta { font-size: 0.8rem; border-left: 3px solid #0d6efd; padding-left: 10px; background: #f1f5f9; border-radius: 12px; }
        .empty-state { background: #ffffffdd; backdrop-filter: blur(2px); border-radius: 2rem; padding: 3rem; text-align: center; }
        footer { text-align: center; padding: 24px 0; color: #64748b; border-top: 1px solid #e2e8f0; margin-top: 32px; }
        .guest-badge { background: #e9ecef; border-radius: 20px; padding: 2px 12px; font-size: 0.7rem; color: #2c3e66; }
        .comment-item { background: #ffffff; border-radius: 20px; padding: 12px 16px; margin-bottom: 12px; border: 1px solid #e9edf2; }
        .comment-meta { font-size: 0.75rem; color: #5b6e8c; }
        .detail-cover { background: white; border-radius: 32px; padding: 2rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="#" onclick="showBlogList()">📖 墨韵博客 · 云端阅览</a>
        <div id="nav-auth" class="d-flex align-items-center gap-2"></div>
    </div>
</nav>

<div class="container">
    <div id="blog-list-page" class="d-none">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
            <h2 class="fw-semibold" style="color:#0f172a;">✨ 最新笔谈</h2>
            <button class="btn btn-success rounded-pill px-4 shadow-sm" onclick="checkBeforePublish()">✍️ 写博客</button>
        </div>
        <div id="blog-list" class="row g-3"></div>
    </div>

    <div id="blog-detail-page" class="d-none">
        <div class="mb-3"><button class="btn btn-outline-secondary rounded-pill px-3" onclick="showBlogList()">← 返回列表</button></div>
        <div id="detail-content" class="detail-cover"></div>
    </div>

    <div id="login-page" class="d-none">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-header bg-white border-0 pt-4"><h3 class="text-center fw-semibold">🔐 登录</h3></div>
                    <div class="card-body p-4">
                        <form id="login-form">
                            <div class="mb-3"><label class="form-label">用户名</label><input type="text" id="login-username" class="form-control" required></div>
                            <div class="mb-4"><label class="form-label">密码</label><input type="password" id="login-password" class="form-control" required></div>
                            <button type="submit" class="btn btn-primary w-100 rounded-pill">登录</button>
                            <p class="mt-3 text-center small"><a href="#" onclick="showRegisterPage()">没有账号？立即注册</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="register-page" class="d-none">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-header bg-white border-0 pt-4"><h3 class="text-center fw-semibold">📝 注册</h3></div>
                    <div class="card-body p-4">
                        <form id="register-form">
                            <div class="mb-3"><label class="form-label">用户名 (作为登录凭据)</label><input type="text" id="register-username" class="form-control" required></div>
                            <div class="mb-4"><label class="form-label">密码</label><input type="password" id="register-password" class="form-control" required></div>
                            <button type="submit" class="btn btn-primary w-100 rounded-pill">注册</button>
                            <p class="mt-3 text-center small"><a href="#" onclick="showLoginPage()">已有账号？去登录</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="publish-page" class="d-none">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-4">
                <form id="publish-form">
                    <div class="mb-3"><label class="form-label">标题</label><input type="text" id="blog-title" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">正文</label><textarea id="blog-content" rows="8" class="form-control" required></textarea></div>
                    <button type="submit" class="btn btn-primary rounded-pill px-4">🚀 立即发布</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editBlogModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4">
            <div class="modal-body">
                <div class="mb-3"><label class="form-label">标题</label><input type="text" id="edit-title" class="form-control"></div>
                <div class="mb-3"><label class="form-label">内容</label><textarea id="edit-content" rows="6" class="form-control"></textarea></div>
                <button class="btn btn-primary w-100 rounded-pill" id="saveEditBtn">保存修改</button>
            </div>
        </div>
    </div>
</div>

<footer>© 墨韵博客 · Supabase 云端版</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ========== 配置 Supabase (请替换此处) ==========
    const SUPABASE_URL = 'https://icqmextioewqhjdnzlsf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljcW1leHRpb2V3cWhqZG56bHNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3OTE5MTgsImV4cCI6MjA5MTM2NzkxOH0.5qBYNkBNuEzQ0oXe5a29DKCbFaghW_pCOPnFMM20ZD0';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let editModal = null;
    let currentEditId = null;

    // ========== 基础工具 ==========
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    function showPage(id) {
        document.querySelectorAll('[id$="-page"]').forEach(el => el.classList.add('d-none'));
        document.getElementById(id).classList.remove('d-none');
        if (id === 'blog-list-page') renderBlogs();
    }

    async function checkUser() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) {
            const { data: profile } = await supabaseClient.from('profiles').select('username').eq('id', user.id).single();
            currentUser = { id: user.id, username: profile?.username || user.email.split('@')[0] };
        } else {
            currentUser = null;
        }
        updateNav();
    }

    function updateNav() {
        const nav = document.getElementById('nav-auth');
        nav.innerHTML = currentUser 
            ? `<span class="nav-user">👤 ${escapeHtml(currentUser.username)}</span><button class="btn btn-sm btn-light rounded-pill" onclick="logout()">退出</button>`
            : `<button class="btn btn-sm btn-outline-light rounded-pill" onclick="showLoginPage()">登录</button><span class="guest-badge ms-1">只读模式</span>`;
    }

    // ========== 身份认证 ==========
    document.getElementById('register-form').onsubmit = async (e) => {
        e.preventDefault();
        const userVal = document.getElementById('register-username').value;
        const passVal = document.getElementById('register-password').value;
        const email = userVal + "@dummy.com"; 

        const { data, error } = await supabaseClient.auth.signUp({ email, password: passVal });
        if (error) return alert(error.message);
        
        await supabaseClient.from('profiles').insert([{ id: data.user.id, username: userVal }]);
        alert('注册成功，请登录');
        showLoginPage();
    };

    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-username').value + "@dummy.com";
        const password = document.getElementById('login-password').value;
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) return alert('账号或密码错误');
        await checkUser();
        showBlogList();
    };

    async function logout() {
        await supabaseClient.auth.signOut();
        currentUser = null;
        updateNav();
        showBlogList();
    }

    // ========== 博客核心逻辑 ==========
    async function renderBlogs() {
        const { data: blogs } = await supabaseClient.from('blogs').select('*').order('created_at', { ascending: false });
        const container = document.getElementById('blog-list');
        if (!blogs || !blogs.length) {
            container.innerHTML = `<div class="col-12"><div class="empty-state"><h5>暂无内容</h5></div></div>`;
            return;
        }
        container.innerHTML = blogs.map(b => `
            <div class="col-12">
                <div class="card blog-card rounded-4" onclick="renderBlogDetail(${b.id})">
                    <div class="card-body p-4">
                        <h4 class="fw-bold">${escapeHtml(b.title)}</h4>
                        <div class="blog-meta mb-2">✍️ ${escapeHtml(b.author_name)} · 🕘 ${new Date(b.created_at).toLocaleString()}</div>
                        <p class="text-muted">${escapeHtml(b.content.substring(0, 100))}...</p>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function renderBlogDetail(id) {
        const { data: blog } = await supabaseClient.from('blogs').select('*').eq('id', id).single();
        const { data: comments } = await supabaseClient.from('comments').select('*').eq('blog_id', id).order('created_at', { ascending: false });
        
        const isOwner = currentUser && currentUser.id === blog.author_id;
        
        const html = `
            <h2 class="fw-bold">${escapeHtml(blog.title)}</h2>
            <div class="blog-meta mb-4">👤 ${escapeHtml(blog.author_name)} · 🕘 ${new Date(blog.created_at).toLocaleString()}</div>
            <div class="card-text fs-5">${escapeHtml(blog.content).replace(/\n/g, '<br>')}</div>
            ${isOwner ? `<div class="mt-4"><button class="btn btn-sm btn-outline-primary" onclick="openEdit(${blog.id}, '${blog.title.replace(/'/g,"\\'")}', '${blog.content.replace(/'/g,"\\'")}')">编辑</button> <button class="btn btn-sm btn-outline-danger" onclick="deleteBlog(${blog.id})">删除</button></div>` : ''}
            <hr class="my-5">
            <h5>💬 评论 (${comments?.length || 0})</h5>
            <div class="mt-3">${currentUser ? `<div class="d-flex gap-2"><input id="c-input" class="form-control rounded-pill" placeholder="说点什么..."><button class="btn btn-primary rounded-pill" onclick="postComment(${id})">发表</button></div>` : ''}</div>
            <div class="mt-4">${(comments || []).map(c => `
                <div class="comment-item">
                    <div class="d-flex justify-content-between"><strong>${escapeHtml(c.author_name)}</strong> <small class="text-muted">${new Date(c.created_at).toLocaleDateString()}</small></div>
                    <div>${escapeHtml(c.content)}</div>
                </div>
            `).join('')}</div>
        `;
        document.getElementById('detail-content').innerHTML = html;
        showPage('blog-detail-page');
    }

    document.getElementById('publish-form').onsubmit = async (e) => {
        e.preventDefault();
        const title = document.getElementById('blog-title').value;
        const content = document.getElementById('blog-content').value;
        const { error } = await supabaseClient.from('blogs').insert([{ 
            title, content, author_id: currentUser.id, author_name: currentUser.username 
        }]);
        if (error) alert(error.message);
        else showBlogList();
    };

    async function postComment(blogId) {
        const content = document.getElementById('c-input').value;
        if(!content) return;
        await supabaseClient.from('comments').insert([{ 
            blog_id: blogId, content, author_id: currentUser.id, author_name: currentUser.username 
        }]);
        renderBlogDetail(blogId);
    }

    async function deleteBlog(id) {
        if(!confirm('确定删除吗？')) return;
        await supabaseClient.from('blogs').delete().eq('id', id);
        showBlogList();
    }

    function openEdit(id, title, content) {
        currentEditId = id;
        document.getElementById('edit-title').value = title;
        document.getElementById('edit-content').value = content;
        editModal.show();
    }

    document.getElementById('saveEditBtn').onclick = async () => {
        const title = document.getElementById('edit-title').value;
        const content = document.getElementById('edit-content').value;
        await supabaseClient.from('blogs').update({ title, content }).eq('id', currentEditId);
        editModal.hide();
        renderBlogDetail(currentEditId);
    };

    // ========== 初始化控制 ==========
    window.onload = () => {
        editModal = new bootstrap.Modal(document.getElementById('editBlogModal'));
        checkUser();
        showBlogList();
    };

    window.showLoginPage = () => showPage('login-page');
    window.showRegisterPage = () => showPage('register-page');
    window.showBlogList = () => showPage('blog-list-page');
    window.checkBeforePublish = () => currentUser ? showPage('publish-page') : showLoginPage();
</script>
</body>
</html>
